<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ALM - 가계부</title>
    <!-- 인라인 style 제거 → 외부 CSS로 분리 (다른 페이지와 동일한 구조) -->
    <link rel="stylesheet" href="/css/Ledger.css">
</head>
<body>

<!-- 헤더 -->
<div class="page-header">
    <a href="/main.html" class="back-btn">← 대시보드</a>
    <div>
        <h1>📒 가계부</h1>
        <div class="subtitle">지출 · 수입 내역 관리</div>
    </div>
</div>

<!-- 월별 요약 -->
<div class="summary-bar">
    <div class="summary-card income-card">
        <div class="label">이달의 수입</div>
        <div class="amount" id="total-income">-</div>
    </div>
    <div class="summary-card expense-card">
        <div class="label">이달의 지출</div>
        <div class="amount" id="total-expense">-</div>
    </div>
    <div class="summary-card net-card">
        <div class="label">이달의 순수지</div>
        <div class="amount" id="net-amount">-</div>
    </div>
</div>

<!-- 탭 바 -->
<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('general', this)">
        📋 일반 지출입
    </button>
</div>

<!-- ══════════════════════════════════════════
     탭 1: 일반 지출입 (달력 + 내역 목록)
══════════════════════════════════════════ -->
<div id="tab-general" class="tab-content active">
    <div class="general-layout">

        <!-- 왼쪽: 달력 패널 -->
        <div class="calendar-panel">
            <div class="cal-nav">
                <button class="cal-nav-btn" onclick="prevMonth()">‹</button>
                <span class="cal-title" id="cal-title">2026년 1월</span>
                <button class="cal-nav-btn" onclick="nextMonth()">›</button>
            </div>

            <table class="cal-table">
                <thead>
                    <tr>
                        <th>일</th><th>월</th><th>화</th>
                        <th>수</th><th>목</th><th>금</th><th>토</th>
                    </tr>
                </thead>
                <tbody id="cal-body">
                    <!-- ledger.js의 renderCalendar()가 채움 -->
                </tbody>
            </table>

            <div class="cal-month-summary">
                <div class="sum-row">
                    <span class="sum-label">이달 수입</span>
                    <span class="sum-val income" id="cal-income">-</span>
                </div>
                <div class="sum-row">
                    <span class="sum-label">이달 지출</span>
                    <span class="sum-val expense" id="cal-expense">-</span>
                </div>
                <div class="sum-row">
                    <span class="sum-label">순수지</span>
                    <span class="sum-val net" id="cal-net">-</span>
                </div>
            </div>
        </div>

        <!-- 오른쪽: 내역 패널 -->
        <div class="detail-panel">
            <div class="detail-header">
                <div class="detail-title">
                    <span class="detail-date-label" id="detail-label">날짜를 선택하세요</span>
                    <span style="color:#475569; font-size:12px; margin-left:8px;">(달력 날짜 클릭 → 해당일 내역)</span>
                </div>
                <button class="add-btn" onclick="openAddModal()">＋ 내역 추가</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>날짜</th>
                        <th>구분</th>
                        <th>카테고리</th>
                        <th>연동 자산</th>
                        <th style="text-align:right">금액</th>
                    </tr>
                </thead>
                <tbody id="ledger-body">
                    <tr class="empty-row"><td colspan="5">데이터를 불러오는 중...</td></tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<!-- 우클릭 컨텍스트 메뉴 -->
<div id="context-menu">
    <div class="ctx-item danger" onclick="deleteSelected()">🗑️ 이 내역 삭제</div>
</div>

<!-- 내역 추가 모달 -->
<div class="modal-overlay" id="add-modal">
    <div class="modal">
        <div class="modal-header">
            <h3>일반 지출입 내역 추가</h3>
            <button class="modal-close" onclick="closeAddModal()">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>구분</label>
                <div class="direction-toggle">
                    <button class="dir-btn active-in"  id="btn-in"  onclick="setDirection('IN')">＋ 수입</button>
                    <button class="dir-btn"             id="btn-out" onclick="setDirection('OUT')">－ 지출</button>
                </div>
            </div>
            <input type="hidden" id="direction-val" value="IN">

            <div class="form-row">
                <div class="form-group">
                    <label>카테고리</label>
                    <select id="sel-category" onchange="onCategoryChange(this)"></select>
                </div>
                <div class="form-group">
                    <label>연동 자산 <span style="color:#475569">(선택)</span></label>
                    <select id="sel-asset">
                        <option value="0">-- 없음 --</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>금액 (원)</label>
                    <input type="number" id="inp-amount" placeholder="예: 50000" min="0">
                </div>
                <div class="form-group">
                    <label>거래일</label>
                    <input type="date" id="inp-date">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeAddModal()">취소</button>
            <button class="btn-submit" onclick="submitLedger()">등록</button>
        </div>
    </div>
</div>

<!-- 인라인 script 제거 → 외부 JS로 분리 (다른 페이지와 동일한 구조) -->
<script src="/js/ledger.js"></script>
</body>
</html>
