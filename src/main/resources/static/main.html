<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ALM - 통합 자산 관리 시스템</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
<div class="container">
    <header class="dashboard-header">
        <h1>김동혁 님의 ALM 관제 센터</h1>
        <div class="total-asset-card">
            <span class="label">총자산 합계</span>
            <h2 id="total-amount">15,050,000 원</h2>
        </div>
    </header>

    <main class="grid-container">
        <section class="card active" id="asset-card" onclick="location.href='asset.html'">
            <div class="card-header">통합 자산 관리</div>
            <div class="card-content">
                <p>현재 운용 자산 리스트 및<br>상세 내역 확인</p>
            </div>
        </section>

        <section class="card pending">
            <div class="card-header">가계부 및 현금흐름</div>
            <div class="card-content">아직 미구현 영역입니다.</div>
        </section>

        <section class="card pending">
            <div class="card-header">지능형 목표 관리</div>
            <div class="card-content">아직 미구현 영역입니다.</div>
        </section>

        <section class="card pending">
            <div class="card-header">투자 포트폴리오</div>
            <div class="card-content">아직 미구현 영역입니다.</div>
        </section>
    </main>
</div>

<div id="context-menu" class="context-menu">
    <ul>
        <li onclick="handleAction('insert')">데이터 삽입</li>
        <li onclick="handleAction('update')">데이터 수정</li>
        <li onclick="handleAction('delete')">데이터 삭제</li>
    </ul>
</div>

<script src="main.js"></script>
</body>
</html>
